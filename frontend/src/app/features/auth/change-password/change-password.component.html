<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-lg mx-auto mt-6">
  
    <h2 class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">Thay đổi mật khẩu</h2>
  
    <div *ngIf="showSuccessMessage" class="mb-4 p-3 bg-green-100 text-green-700 rounded-md text-sm border border-green-200 flex items-center">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
      Đổi mật khẩu thành công!
    </div>
  
    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <div>
        <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu hiện tại</label>
        <input 
          type="password" 
          id="currentPassword" 
          formControlName="currentPassword"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#F6C943] focus:border-transparent transition-colors"
          [ngClass]="{'border-red-500': f['currentPassword'].invalid && f['currentPassword'].touched}"
        >
        <div *ngIf="f['currentPassword'].invalid && f['currentPassword'].touched" class="text-red-500 text-xs mt-1">
          Vui lòng nhập mật khẩu hiện tại.
        </div>
      </div>
  
      <div>
        <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới</label>
        <input 
          type="password" 
          id="newPassword" 
          formControlName="newPassword"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#F6C943] focus:border-transparent transition-colors"
          [ngClass]="{'border-red-500': f['newPassword'].invalid && f['newPassword'].touched}"
        >
        <div *ngIf="f['newPassword'].invalid && f['newPassword'].touched" class="text-red-500 text-xs mt-1">
          <span *ngIf="f['newPassword'].errors?.['required']">Vui lòng nhập mật khẩu mới.</span>
          <span *ngIf="f['newPassword'].errors?.['minlength']">Mật khẩu phải có ít nhất 6 ký tự.</span>
        </div>
      </div>
  
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Nhập lại mật khẩu mới</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#F6C943] focus:border-transparent transition-colors"
          [ngClass]="{'border-red-500': (passwordForm.errors?.['mismatch'] || f['confirmPassword'].invalid) && f['confirmPassword'].touched}"
        >
        <div *ngIf="f['confirmPassword'].touched" class="text-red-500 text-xs mt-1">
          <span *ngIf="f['confirmPassword'].errors?.['required']">Vui lòng nhập lại mật khẩu.</span>
          <span *ngIf="!f['confirmPassword'].errors?.['required'] && passwordForm.errors?.['mismatch']">Mật khẩu nhập lại không khớp.</span>
        </div>
      </div>
  
      <div class="pt-2 flex justify-end space-x-3">
        <button 
          type="submit" 
          [disabled]="passwordForm.invalid"
          class="px-4 py-2 text-sm font-semibold text-gray-900 bg-[#F6C943] rounded-md hover:bg-[#e5ba32] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#F6C943] disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm"
        >
          Lưu thay đổi
        </button>
      </div>
  
    </form>
  </div>
