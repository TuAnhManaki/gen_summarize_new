<div class="bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden">
  
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
      <h2 class="text-lg font-bold text-gray-800">Chỉnh sửa thông tin cá nhân</h2>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="p-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="space-y-4">
          <h3 class="text-sm font-semibold text-[#5FBC33] uppercase border-b pb-1">Thông tin chung</h3>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên <span class="text-red-500">*</span></label>
            <input type="text" formControlName="fullName" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
            <small *ngIf="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched" class="text-red-500">Vui lòng nhập họ tên.</small>
          </div>
  
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Năm sinh</label>
              <input type="number" formControlName="birthYear" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Giới tính</label>
              <select formControlName="gender" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
              </select>
            </div>
          </div>
  
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
            <input type="tel" formControlName="phoneNumber" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
          </div>
  
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email (Không thể sửa)</label>
            <input type="email" formControlName="email" class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded text-gray-500 cursor-not-allowed">
          </div>
        </div>
  
        <div class="space-y-4">
          <h3 class="text-sm font-semibold text-[#5FBC33] uppercase border-b pb-1">Trường học & Gia đình</h3>
  
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tỉnh/TP</label>
            <select formControlName="city" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
              <option value="">Chọn Tỉnh/TP</option>
              <option value="Hà Nội">Hà Nội</option>
              <option value="Hồ Chí Minh">Hồ Chí Minh</option>
              <option value="Đà Nẵng">Đà Nẵng</option>
              </select>
          </div>
  
          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Trường học</label>
              <input type="text" formControlName="school" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Lớp</label>
              <input type="text" formControlName="grade" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
            </div>
          </div>
  
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tên phụ huynh</label>
            <input type="text" formControlName="parentName" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
          </div>
  
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email phụ huynh</label>
            <input type="email" formControlName="parentEmail" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#5FBC33] focus:border-[#5FBC33]">
          </div>
        </div>
      </div>
  
      <div class="mt-8 flex justify-end gap-3 pt-4 border-t border-gray-100">
        <button 
          type="button" 
          (click)="onCancel()"
          class="px-5 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded hover:bg-gray-50 transition"
        >
          Hủy bỏ
        </button>
        
        <button 
          type="submit" 
          [disabled]="profileForm.invalid"
          class="px-6 py-2 text-sm font-bold text-white bg-[#5FBC33] rounded shadow-md hover:bg-[#51a32b] disabled:opacity-50 disabled:cursor-not-allowed transition"
        >
          Lưu thông tin
        </button>
      </div>
  
    </form>
  </div>
