<div class="min-h-screen bg-gray-50 font-sans ">

  <div class="h-44 w-full bg-gradient-to-b from-[#8EC5C1] to-[#A9D7D4] relative overflow-hidden">
    </div>

  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="relative -mt-16 sm:-mt-20 flex items-end space-x-4 pb-6">
      <div class="h-32 w-32 sm:h-36 sm:w-36 rounded-full border-4 border-white overflow-hidden bg-gray-200 shadow-sm flex items-center justify-center">
        <img *ngIf="user.avatarUrl; else defaultIcon" [src]="user.avatarUrl" alt="{{ user.fullName }}" class="h-full w-full object-cover">
        
        <ng-template #defaultIcon>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-20 h-20 text-gray-400">
            <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
          </svg>
        </ng-template>
      </div>
      
      <div class="pb-4">
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">{{ user.fullName }}</h1>
      </div>
    </div>


    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

      <div class="lg:col-span-1 bg-white rounded-lg shadow-sm border border-gray-200 p-3">
        
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-lg font-bold text-gray-800">Thông tin cá nhân</h2>
          <!-- <button class="bg-[#5FBC33] hover:bg-[#51a32b] text-white font-semibold text-sm py-1.5 px-6 rounded transition-colors">
            Sửa
          </button> -->
        </div>

        <div class="space-y-0 text-sm sm:text-base">
          <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Họ và tên', value: user.fullName, bold: true}"></ng-container>
          <!-- <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Năm sinh', value: user.birthYear}"></ng-container>
          <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Giới tính', value: user.gender}"></ng-container> -->
          <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Email address', value: user.email, breakAll: true}"></ng-container>
          <!-- <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Số điện thoại', value: user.phoneNumber}"></ng-container> -->
          <!-- <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Tỉnh/TP', value: user.city}"></ng-container>
          <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Đang học trường', value: user.school}"></ng-container>
          <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Học lớp', value: user.grade}"></ng-container>
          <ng-container *ngTemplateOutlet="infoRow; context: {label: 'Tên phụ huynh', value: user.parentName}"></ng-container> -->
          <!-- <div class="grid grid-cols-3 gap-4 py-3 items-center">
             <div class="text-gray-600 font-medium col-span-1">Email phụ huynh</div>
             <div class="text-gray-900 col-span-2 break-all">{{ user.parentEmail }}</div>
          </div> -->
        </div>

        <div class="mt-8">
          <button routerLink="/auth/change_password" class="bg-[#F6C943] hover:bg-[#e5ba32] text-gray-900 font-semibold text-sm py-2 px-4 rounded transition-colors shadow-sm">
            Thay đổi mật khẩu
          </button>
        </div>

      </div> <div class="lg:col-span-2 bg-white rounded-lg shadow-sm border border-gray-200 p-2 flex flex-col min-h-[300px]">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Chương trình ôn luyện</h2>
        
        <div class="flex-grow flex items-center justify-center text-gray-500 font-medium">
          Không có dữ liệu
        </div>
      </div> </div> </div>
</div>


<ng-template #infoRow let-label="label" let-value="value" let-bold="bold" let-breakAll="breakAll">
  <div class="grid grid-cols-3 gap-4 py-3 border-b border-gray-100 items-start sm:items-center">
    <div class="text-gray-600 font-medium col-span-1">{{ label }}</div>
    <div class="text-gray-900 col-span-2" [ngClass]="{'font-semibold': bold, 'break-all': breakAll}">
      {{ value }}
    </div>
  </div>
</ng-template>
