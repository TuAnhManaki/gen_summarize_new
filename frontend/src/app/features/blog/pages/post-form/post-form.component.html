<div class="admin-container">
  <div class="header">
    <h2>{{ isEditMode ? 'Cập nhật bài viết' : 'Thêm bài viết mới' }}</h2>
    <button class="btn-cancel" routerLink="/blog/admin/posts">Hủy</button>
  </div>

  <form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="form-layout">
    
    <div class="col-main">
      
      <div class="form-group">
        <label>Tiêu đề bài viết</label>
        <input type="text" formControlName="title" (blur)="generateSlug()" placeholder="Nhập tiêu đề...">
      </div>

      <div class="form-group">
        <label>Slug (URL)</label>
        <input type="text" formControlName="slug" class="slug-input">
      </div>

      <div class="form-group" formGroupName="metaData">
        <label>Mô tả ngắn (Summary)</label>
        <textarea formControlName="summary" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label>Nội dung chi tiết</label>
        <textarea formControlName="content" rows="15" placeholder="Nhập nội dung HTML hoặc Markdown..."></textarea>
      </div>
    </div>

    <div class="col-sidebar">
      
      <div class="panel">
        <h3>Đăng bài</h3>
        <div class="form-group">
          <label>Trạng thái</label>
          <select formControlName="status">
            <option value="DRAFT">Nháp (Draft)</option>
            <option value="PUBLISHED">Công khai (Published)</option>
            <option value="ARCHIVED">Lưu trữ (Archived)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Danh mục</label>
          <select formControlName="categoryId">
              <option [ngValue]="null">-- Chọn danh mục --</option>
              <option *ngFor="let cat of categories" [ngValue]="cat.id">
                  {{ cat.name }}
              </option>
          </select>
      </div>
        <button type="submit" class="btn-save" [disabled]="isLoading">
          {{ isLoading ? 'Đang lưu...' : 'Lưu bài viết' }}
        </button>
      </div>

      <div class="panel" formGroupName="metaData">
        <h3>Thông tin mở rộng</h3>
        
        <div class="form-group">
          <label>Link Ảnh Thumbnail</label>
          <input type="text" formControlName="thumbnail" placeholder="https://...">
          <img *ngIf="postForm.get('metaData.thumbnail')?.value" 
               [src]="postForm.get('metaData.thumbnail')?.value" 
               class="img-preview">
        </div>

        <div class="form-group">
          <label>Tags (cách nhau bởi dấu phẩy)</label>
          <input type="text" formControlName="tags" placeholder="Java, Spring Boot, Tips">
        </div>

        <div class="form-group">
          <label>Thời gian đọc (phút)</label>
          <input type="number" formControlName="readingTime">
        </div>
      </div>

    </div>

  </form>
</div>
